<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeDL Web Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; }
        .form-control { background-color: #2d2d2d; border: 1px solid #444; color: #fff; }
        .form-control:focus { background-color: #2d2d2d; color: #fff; border-color: #bb86fc; box-shadow: none; }
        .btn-primary { background-color: #bb86fc; border: none; color: #000; font-weight: bold; }
        .btn-primary:hover { background-color: #9965f4; }
        .progress { height: 25px; background-color: #2d2d2d; }
        .log-box { background-color: #000; border: 1px solid #333; height: 200px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.9em; color: #00ff00; }
        .step-badge { background-color: #bb86fc; color: #000; padding: 5px 10px; border-radius: 50%; font-weight: bold; margin-right: 10px; }
        h4 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-5">🎬 AnimeDL Auto-Burner Tool</h1>
        
        <!-- Step 1: Input URL -->
        <div class="card p-4">
            <h4><span class="step-badge">1</span> Link Extraction</h4>
            <div class="input-group mb-3">
                <input type="text" id="urlInput" class="form-control" placeholder="Paste Anime/KDrama Episode URL here...">
                <button class="btn btn-primary" onclick="startExtraction()">🔍 Extract Links</button>
            </div>
        </div>

        <!-- Results Area -->
        <div id="resultsArea" class="card p-4 d-none">
            <h4><span class="step-badge">2</span> Found Media</h4>
            
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Video Source (MP4/M3U8):</label>
                    <select id="videoSelect" class="form-control mb-3"></select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Subtitle URL (Optional):</label>
                    <input type="text" id="subInput" class="form-control mb-3" placeholder="Paste Subtitle URL or Select detected">
                    <select id="detectedSubs" class="form-control mb-3 d-none" onchange="document.getElementById('subInput').value=this.value">
                        <option value="">-- Select Detected Subtitle --</option>
                    </select>
                </div>
            </div>
            
            <button class="btn btn-success w-100 mt-2" onclick="startProcessing()">🚀 Start Download, Burn & Upload</button>
        </div>

        <!-- Progress Section -->
        <div id="progressArea" class="card p-4 d-none">
            <h4><span class="step-badge">3</span> Live Progress</h4>
            
            <div class="mb-3">
                <label class="form-label" id="statusLabel">Waiting...</label>
                <div class="progress">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%">0%</div>
                </div>
            </div>
            
            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <script>
        function generateTaskId() {
            return 'task_' + Math.random().toString(36).substr(2, 9);
        }

        function log(msg) {
            const box = document.getElementById('logBox');
            box.innerHTML += `> ${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }

        async function startExtraction() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Please enter a URL");

            const taskId = generateTaskId();
            
            // Show areas
            document.getElementById('progressArea').classList.remove('d-none');
            document.getElementById('logBox').innerHTML = '';
            
            // Start SSE listening
            listenToProgress(taskId);

            // Call API
            const response = await fetch('/api/extract', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url, task_id: taskId})
            });
        }

        async function startProcessing() {
            const videoUrl = document.getElementById('videoSelect').value;
            const subUrl = document.getElementById('subInput').value;
            
            if(!videoUrl) return alert("No video selected");
            
            const taskId = generateTaskId();
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('statusLabel').innerText = 'Starting process...';
            
            listenToProgress(taskId);
            
            await fetch('/api/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    task_id: taskId,
                    video_url: videoUrl,
                    sub_url: subUrl
                })
            });
        }

        function listenToProgress(taskId) {
            const evtSource = new EventSource(`/progress/${taskId}`);
            
            evtSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if(data.keepalive) return;

                if(data.message) {
                    log(data.message);
                    document.getElementById('statusLabel').innerText = data.message;
                }
                
                if(data.percent) {
                    document.getElementById('progressBar').style.width = data.percent + '%';
                    document.getElementById('progressBar').innerText = Math.round(data.percent) + '%';
                }
                
                // Handle extraction data
                if(data.data && data.data.mp4) {
                    const resArea = document.getElementById('resultsArea');
                    resArea.classList.remove('d-none');
                    
                    // Fill Video Select
                    const vSelect = document.getElementById('videoSelect');
                    vSelect.innerHTML = '';
                    
                    [...data.data.m3u8, ...data.data.mp4].forEach(link => {
                        const opt = document.createElement('option');
                        opt.value = link;
                        opt.text = link.substring(0, 60) + '...';
                        vSelect.appendChild(opt);
                    });
                    
                    // Fill Subs
                    if(data.data.subtitles.length > 0) {
                        const sSelect = document.getElementById('detectedSubs');
                        sSelect.classList.remove('d-none');
                        sSelect.innerHTML = '<option value="">-- Select Detected Subtitle --</option>';
                        data.data.subtitles.forEach(link => {
                            const opt = document.createElement('option');
                            opt.value = link;
                            opt.text = link.split('/').pop();
                            sSelect.appendChild(opt);
                        });
                    }
                }

                if(data.done) {
                    evtSource.close();
                    if(data.error) {
                        alert("Error: " + data.error);
                    }
                }
            };
            
            evtSource.onerror = function() {
                evtSource.close();
            };
        }
    </script>
</body>
  </html>
